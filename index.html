<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Cardo – 每日翻牌</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=Cinzel:wght@400;600&display=swap');

:root {
  --navy:#040d1a; --deep:#06101f;
  --teal:#0d7377; --teal-b:#14b8c8; --teal-dim:rgba(20,184,200,.18);
  --silver:#c8d8e8; --silver-b:#e8f4ff;
  --gold:#c9a84c; --gold-b:#f0d080;
  --muted:#6a8aaa; --text:#ddeeff;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:var(--navy);font-family:'Noto Serif TC',serif;overflow:hidden;color:var(--text)}

/* ─── PAGE SYSTEM ─── */
.page{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
      transition:opacity .45s ease,transform .45s ease;will-change:transform,opacity}
.page.hidden{opacity:0;pointer-events:none}
#page-flip{z-index:10}
#page-flip.exit{opacity:0;transform:scale(.94)}
#page-detail{z-index:20;background:var(--navy);overflow-y:auto;
             transform:translateY(30px)}
#page-detail.show{opacity:1;pointer-events:all;transform:translateY(0)}

/* ─── STARS ─── */
.sf{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.st{position:absolute;background:#fff;border-radius:50%;
    animation:twk var(--d,3s) ease-in-out infinite var(--dl,0s);opacity:0}
.stx{position:absolute;width:1.5px;height:16px;
     background:linear-gradient(to bottom,transparent,rgba(200,230,255,.8),transparent);
     animation:twk var(--d,4s) ease-in-out infinite var(--dl,0s);opacity:0}
.stx::after{content:'';position:absolute;top:50%;left:50%;
            transform:translate(-50%,-50%) rotate(90deg);width:1.5px;height:16px;background:inherit}
@keyframes twk{0%,100%{opacity:0;transform:scale(.5)}50%{opacity:var(--pk,.8);transform:scale(1)}}
.nb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0}

/* ─── FLIP PAGE ─── */
.flip-inner{position:relative;z-index:1;display:flex;flex-direction:column;
            align-items:center;height:100dvh;padding:0 20px 20px}
.hdr{width:100%;text-align:center;padding:48px 0 8px}
.hdr-logo{font-family:'Cinzel',serif;font-size:15px;letter-spacing:5px;color:var(--silver);opacity:.75;text-transform:uppercase}
.hdr-sub{font-size:10px;color:var(--muted);letter-spacing:2.5px;margin-top:2px}
.dateline{display:flex;align-items:center;gap:10px;margin:10px 0 14px;opacity:.5}
.dateline span{font-size:10px;color:var(--silver);letter-spacing:2px}
.dateline hr{flex:1;border:none;height:1px;background:linear-gradient(to right,transparent,var(--teal-b),transparent)}
.hint{font-size:11px;color:var(--muted);letter-spacing:1.5px;text-align:center;margin-bottom:20px}
.hint em{color:var(--teal-b);font-style:normal}

/* ─── CARD STACK ─── */
.cards-area{flex:1;display:flex;align-items:center;justify-content:center;position:relative;width:100%;perspective:1400px}
.card-stack{position:relative;width:210px;height:295px}
.cw{position:absolute;width:210px;height:295px;cursor:pointer;transform-style:preserve-3d;
    transition:transform .85s cubic-bezier(.23,1.01,.32,1),filter .3s ease,opacity .5s ease;
    will-change:transform}
.cw:not(.gone):hover .cb{
  box-shadow:0 0 28px rgba(20,184,200,.55),0 0 60px rgba(13,115,119,.3);
  filter:brightness(1.12)}
.cf,.cb{position:absolute;inset:0;border-radius:18px;
        backface-visibility:hidden;-webkit-backface-visibility:hidden}
.cb{overflow:hidden}
.cb img{width:100%;height:100%;object-fit:cover;border-radius:18px;display:block}
.touch-label{position:absolute;bottom:18px;left:0;right:0;text-align:center;
             font-family:'Cinzel',serif;font-size:9px;letter-spacing:3px;
             color:rgba(200,216,232,.6);pointer-events:none;animation:pulse 2.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:.9}}
.sparks{position:absolute;inset:0;pointer-events:none;overflow:hidden;border-radius:18px}
.spark{position:absolute;width:3px;height:3px;border-radius:50%;background:var(--teal-b);opacity:0;
       animation:sparkle var(--sd,2s) ease-in-out infinite var(--sl,0s)}
@keyframes sparkle{0%,100%{opacity:0;transform:scale(.5)}50%{opacity:.8;transform:scale(1.4)}}
.cf{transform:rotateY(180deg);
    background:linear-gradient(145deg,#0c1f3a 0%,#07162c 60%,#030e1c 100%);
    border:1px solid rgba(201,168,76,.3);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:20px}
.cf-name{font-family:'Cinzel',serif;font-size:17px;color:var(--gold-b);letter-spacing:3px;
         text-shadow:0 0 20px rgba(240,208,128,.45)}
.cw.flipping{animation:flipAnim .75s cubic-bezier(.23,1.01,.32,1) forwards}
@keyframes flipAnim{
  0%{transform:var(--base-t) rotateY(0deg)}
  45%{transform:var(--base-t) rotateY(-90deg) translateY(-16px)}
  100%{transform:var(--base-t) rotateY(-180deg) translateY(-14px)}
}
.cw.flipped{transform:var(--base-t) rotateY(-180deg) translateY(-14px)!important}
.cw.gone{opacity:0;pointer-events:none;transform:translateY(-50px) scale(.88)!important;transition:opacity .4s,transform .4s}

/* ─── BOTTOM CAPS ─── */
.caps-row{display:flex;gap:8px;margin-bottom:14px}
.cap{padding:6px 14px;border-radius:20px;font-size:10px;letter-spacing:1.5px;
     border:1px solid rgba(200,216,232,.15);color:var(--muted);transition:all .4s;
     background:rgba(10,26,48,.6)}
.cap.done{border-color:var(--teal-b);color:var(--teal-b);background:rgba(20,184,200,.08);
          box-shadow:0 0 10px rgba(20,184,200,.15)}
.cta-hint{font-size:10px;color:var(--muted);letter-spacing:2px;opacity:.45;text-align:center}

/* ─── DETAIL PAGE ─── */
.detail-inner{width:100%;max-width:420px;padding:0 20px 40px;margin:0 auto}

/* header */
.dv-hdr{display:flex;align-items:center;justify-content:space-between;padding:50px 0 20px}
.dv-back{width:38px;height:38px;border:1px solid rgba(200,216,232,.2);border-radius:50%;
         display:flex;align-items:center;justify-content:center;
         cursor:pointer;color:var(--silver);font-size:16px;transition:all .2s;flex-shrink:0}
.dv-back:hover{background:var(--teal-dim);border-color:var(--teal-b)}
.dv-mid{text-align:center;flex:1;padding:0 10px}
.dv-nick{font-size:20px;font-weight:600;color:var(--silver-b);letter-spacing:2px;
         text-shadow:0 0 14px rgba(200,220,255,.3)}
.dv-meta{font-size:10px;color:var(--muted);letter-spacing:1.5px;margin-top:3px}
.dv-badge{background:rgba(20,184,200,.12);border:1px solid var(--teal-b);border-radius:20px;
          padding:5px 11px;font-size:11px;color:var(--teal-b);font-family:'Cinzel',serif;
          box-shadow:0 0 14px rgba(20,184,200,.25);white-space:nowrap;flex-shrink:0}

/* personality card */
.pcard{width:100%;border:1px solid rgba(201,168,76,.28);border-radius:20px;
       background:linear-gradient(155deg,#0b1e36 0%,#060f20 100%);
       box-shadow:0 0 40px rgba(201,168,76,.07),inset 0 1px 0 rgba(255,255,255,.04);
       padding:20px 18px 18px;margin-bottom:16px;position:relative;overflow:hidden}
.pcard::before{content:'';position:absolute;inset:0;
               background:radial-gradient(ellipse at 50% 0%,rgba(20,184,200,.07) 0%,transparent 60%);
               pointer-events:none}
.pcard-name{font-family:'Cinzel',serif;font-size:20px;letter-spacing:4px;
            color:var(--gold-b);text-align:center;margin-bottom:16px;
            text-shadow:0 0 22px rgba(240,208,128,.38)}

/* ─── VECTOR BARS ─── */
.vec-grid{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.vec-row{display:flex;align-items:center;gap:8px}
.vec-lbl{font-size:10px;color:var(--muted);letter-spacing:1px;width:28px;flex-shrink:0;text-align:right}
.vec-bar-bg{flex:1;height:5px;background:rgba(200,216,232,.08);border-radius:3px;overflow:hidden}
.vec-bar-fill{height:100%;border-radius:3px;
              background:linear-gradient(to right,#0d7377,#14b8c8);
              box-shadow:0 0 6px rgba(20,184,200,.4);
              transition:width .8s cubic-bezier(.23,1,.32,1)}
.vec-val{font-size:10px;color:var(--teal-b);width:24px;flex-shrink:0;text-align:right;font-family:'Cinzel',serif}

.pcard-desc{font-size:11.5px;line-height:1.9;color:var(--silver);text-align:center;opacity:.8;letter-spacing:.4px}

/* info blocks */
.info-grid{display:flex;flex-direction:column;gap:9px;width:100%;margin-bottom:22px}
.ib{display:flex;align-items:center;gap:12px;
    background:rgba(8,20,40,.8);border:1px solid rgba(200,216,232,.09);
    border-radius:12px;padding:12px 14px}
.ib-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;
         justify-content:center;font-size:14px;flex-shrink:0}
.ic-teal{background:rgba(20,184,200,.14)}
.ic-gold{background:rgba(201,168,76,.14)}
.ic-rose{background:rgba(190,90,110,.14)}
.ib-lbl{font-size:9.5px;color:var(--muted);letter-spacing:1.2px;display:block;margin-bottom:2px}
.ib-val{font-size:12.5px;color:var(--silver);letter-spacing:.4px}

/* buttons */
.btn-area{display:flex;flex-direction:column;gap:10px}
.btn-gold{width:100%;padding:15px;
          background:linear-gradient(135deg,#a87020 0%,var(--gold) 45%,var(--gold-b) 100%);
          border:none;border-radius:14px;font-family:'Noto Serif TC',serif;
          font-size:14px;font-weight:600;color:#09100e;letter-spacing:2px;cursor:pointer;
          position:relative;overflow:hidden;box-shadow:0 4px 22px rgba(201,168,76,.28);transition:all .3s}
.btn-gold::before{content:'';position:absolute;top:-50%;left:-60%;width:35%;height:200%;
                  background:rgba(255,255,255,.18);transform:skewX(-20deg);animation:shim 3.5s infinite}
@keyframes shim{0%{left:-60%}100%{left:140%}}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(201,168,76,.42)}
.btn-gold.sent{background:linear-gradient(135deg,#1a4a30 0%,#1e6640 100%);
               color:#7af0a0;box-shadow:none;cursor:default;transform:none}
.btn-ghost{width:100%;padding:13px;background:transparent;
           border:1px solid rgba(200,216,232,.2);border-radius:14px;
           font-family:'Noto Serif TC',serif;font-size:12px;color:var(--muted);
           letter-spacing:2px;cursor:pointer;transition:all .3s}
.btn-ghost:hover{border-color:var(--teal-b);color:var(--teal-b);background:rgba(20,184,200,.05)}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);
       background:rgba(10,30,50,.95);border:1px solid var(--teal-b);border-radius:30px;
       padding:10px 22px;font-size:12px;color:var(--teal-b);letter-spacing:1.5px;
       white-space:nowrap;opacity:0;transition:all .4s;z-index:999;
       box-shadow:0 0 20px rgba(20,184,200,.2)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

<!-- nebulae -->
<div class="nb" style="width:360px;height:280px;background:radial-gradient(ellipse,#0d7377 0%,transparent 70%);top:-90px;left:-100px;opacity:.1"></div>
<div class="nb" style="width:300px;height:300px;background:radial-gradient(ellipse,#071830 0%,transparent 70%);bottom:0;right:-80px;opacity:.15"></div>
<div class="sf" id="sf"></div>

<!-- PAGE 1: FLIP -->
<div class="page" id="page-flip">
  <div class="flip-inner">
    <div>
      <div class="hdr">
        <div class="hdr-logo">Cardo</div>
        <div class="hdr-sub">每日靈魂配對</div>
      </div>
      <div class="dateline"><hr><span id="dateStr"></span><hr></div>
      <p class="hint">今日有 <em>3</em> 張命運之牌正在等待你翻開</p>
    </div>
    <div class="cards-area">
      <div class="card-stack" id="cardStack"></div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;width:100%">
      <div class="caps-row" id="capsRow"></div>
      <div class="cta-hint" id="ctaHint">點擊卡牌翻開命運</div>
    </div>
  </div>
</div>

<!-- PAGE 2: DETAIL -->
<div class="page hidden" id="page-detail">
  <div class="detail-inner">
    <div class="dv-hdr">
      <div class="dv-back" onclick="goBack()">←</div>
      <div class="dv-mid">
        <div class="dv-nick" id="dv-nick"></div>
        <div class="dv-meta" id="dv-meta"></div>
      </div>
      <div class="dv-badge" id="dv-match"></div>
    </div>

    <div class="pcard">
      <div class="pcard-name" id="dv-pname"></div>
      <div class="vec-grid" id="vecGrid"></div>
      <p class="pcard-desc" id="dv-desc"></p>
    </div>

    <div class="info-grid">
      <div class="ib"><div class="ib-icon ic-teal">🔗</div><div><span class="ib-lbl">關係類型</span><span class="ib-val" id="dv-rel"></span></div></div>
      <div class="ib"><div class="ib-icon ic-gold">⚡</div><div><span class="ib-lbl">風險提示</span><span class="ib-val" id="dv-risk"></span></div></div>
      <div class="ib"><div class="ib-icon ic-rose">✨</div><div><span class="ib-lbl">共同點</span><span class="ib-val" id="dv-common"></span></div></div>
    </div>

    <div class="btn-area">
      <button class="btn-gold" id="btnReq" onclick="sendRequest()">✦ 發送好友請求</button>
      <button class="btn-ghost" onclick="goBack()">看看下一張</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

const STACK=[{rot:-5,tx:-28,ty:10,z:1},{rot:2.5,tx:24,ty:6,z:2},{rot:0,tx:0,ty:0,z:3}];
let remaining=[0,1,2];
const flippedSet=new Set();
const sentSet=new Set();
let currentCI=null;

// ── BUILD STACK
function buildStack(){
  const stack=document.getElementById('cardStack');
  stack.innerHTML='';
  const caps=document.getElementById('capsRow');
  caps.innerHTML='';
  remaining.forEach((ci,si)=>{
    const s=STACK[Math.min(si,STACK.length-1)];
    const t=`rotate(${s.rot}deg) translateX(${s.tx}px) translateY(${s.ty}px)`;
    const cw=document.createElement('div');
    cw.className='cw';
    cw.id='cw-'+ci;
    cw.style.cssText=`--base-t:${t};transform:${t};z-index:${s.z}`;
    cw.onclick=()=>handleCardClick(ci);
    const cb=document.createElement('div');
    cb.className='cb';
    cb.innerHTML=`<img src="${IMG}" alt="card back">
      <div class="sparks">${Array.from({length:10},(_,k)=>`<div class="spark" style="left:${10+Math.random()*80}%;top:${10+Math.random()*80}%;--sd:${1.5+Math.random()*2}s;--sl:${Math.random()*3}s"></div>`).join('')}</div>
      <div class="touch-label">TOUCH TO REVEAL</div>`;
    const cf=document.createElement('div');
    cf.className='cf';
    cf.innerHTML=`<div class="cf-name">${CARDS[ci].pname}</div>`;
    cw.appendChild(cb);cw.appendChild(cf);
    stack.appendChild(cw);
    // cap
    const cap=document.createElement('div');
    cap.className='cap'+(flippedSet.has(ci)?' done':'');
    cap.id='cap-'+ci;
    cap.textContent=flippedSet.has(ci)?'✓ 已翻開':'第'+(si+1)+'張';
    caps.appendChild(cap);
  });
}

function handleCardClick(ci){
  if(flippedSet.has(ci)){ openDetail(ci); return; }
  flippedSet.add(ci);
  const cw=document.getElementById('cw-'+ci);
  if(!cw) return;
  cw.classList.add('flipping');
  cw.addEventListener('animationend',()=>{
    cw.classList.remove('flipping');
    cw.classList.add('flipped');
    const cap=document.getElementById('cap-'+ci);
    if(cap){ cap.className='cap done'; cap.textContent='✓ 已翻開'; }
    // short pause then go to detail
    setTimeout(()=>openDetail(ci),300);
  },{once:true});
}

// ── DETAIL PAGE
function buildVecBars(vals){
  const g=document.getElementById('vecGrid');
  g.innerHTML='';
  VKEYS.forEach((k,i)=>{
    const pct=Math.round(vals[i]*100);
    const row=document.createElement('div');
    row.className='vec-row';
    row.innerHTML=`<div class="vec-lbl">${k}</div>
      <div class="vec-bar-bg"><div class="vec-bar-fill" style="width:0%" data-w="${pct}%"></div></div>
      <div class="vec-val">${pct}</div>`;
    g.appendChild(row);
  });
  // animate bars after a frame
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    g.querySelectorAll('.vec-bar-fill').forEach(el=>el.style.width=el.dataset.w);
  }));
}

function openDetail(ci){
  currentCI=ci;
  const c=CARDS[ci];
  document.getElementById('dv-nick').textContent=c.nick+'_'+c.age;
  document.getElementById('dv-meta').textContent=c.age+'歲 · '+c.job;
  document.getElementById('dv-match').textContent=c.match;
  document.getElementById('dv-pname').textContent=c.pname;
  document.getElementById('dv-desc').textContent=c.desc;
  document.getElementById('dv-rel').textContent=c.rel;
  document.getElementById('dv-risk').textContent=c.risk;
  document.getElementById('dv-common').textContent=c.common;
  buildVecBars(c.vals);

  const btn=document.getElementById('btnReq');
  if(sentSet.has(ci)){btn.className='btn-gold sent';btn.textContent='✓ 請求已送出';}
  else{btn.className='btn-gold';btn.textContent='✦ 發送好友請求';}

  // scroll to top
  document.getElementById('page-detail').scrollTop=0;

  // transition: flip page fades, detail slides in
  const fp=document.getElementById('page-flip');
  const dp=document.getElementById('page-detail');
  fp.classList.add('exit');
  dp.classList.remove('hidden');
  requestAnimationFrame(()=>requestAnimationFrame(()=>dp.classList.add('show')));
  setTimeout(()=>{fp.classList.add('hidden');fp.classList.remove('exit');},450);
}

function goBack(){
  const fp=document.getElementById('page-flip');
  const dp=document.getElementById('page-detail');
  // remove flipped card from remaining and rebuild
  if(currentCI!==null) remaining=remaining.filter(i=>i!==currentCI);
  buildStack();
  if(remaining.length===0) document.getElementById('ctaHint').textContent='今日三張牌全部翻開 ✦';

  dp.classList.remove('show');
  fp.classList.remove('hidden');
  requestAnimationFrame(()=>requestAnimationFrame(()=>fp.classList.remove('exit')));
  setTimeout(()=>{dp.classList.add('hidden');},450);
}

function sendRequest(){
  if(currentCI!==null && !sentSet.has(currentCI)){
    sentSet.add(currentCI);
    const btn=document.getElementById('btnReq');
    btn.className='btn-gold sent';btn.textContent='✓ 請求已送出';
    showToast('✦ 好友請求已送出，等待對方回應');
  }
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

buildStack();
</script>
</body>
